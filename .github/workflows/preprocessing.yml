name: Auto Preprocessing

on:
  push:
    branches:
      - main

jobs:
  run-preprocessing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pandas numpy scikit-learn kaggle

      - name: Run Preprocessing
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: |
          # run the preprocessing script
          cd preprocessing
          python automate_Yana_Suryana.py

      - name: Commit result
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add preprocessing/house-price-clean_preprocessing.csv
          # Commit and push only if there are changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update cleaned dataset" && git push)